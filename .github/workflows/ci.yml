name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-hf-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,local]"

      - name: Run test suite (with coverage)
        run: pytest -q --cov=behaviorci --cov-report=term-missing

      - name: Run in parallel (pytest-xdist)
        run: pytest -q -n auto -m "not slow"

      - name: Dogfood the real record/check flow
        run: |
          pytest tests/examples -q --behaviorci-record \
            --behaviorci-db .behaviorci/ci.db --behaviorci-report bci-report.json
          pytest tests/examples -q --behaviorci --behaviorci-db .behaviorci/ci.db

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black
        run: black --check src/ tests/ conftest.py

      - name: isort
        run: isort --check-only src/ tests/ conftest.py

      - name: flake8
        run: flake8 src/ tests/ conftest.py

      - name: mypy
        run: mypy src/behaviorci/ --ignore-missing-imports
