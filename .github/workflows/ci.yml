name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: ${{ runner.os }}-st-model-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-st-model-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # FIX: Install BOTH dev tools and local ML models
          pip install -e ".[dev,local]"

      - name: Run tests (record mode)
        run: pytest tests/ --behaviorci-record -v --tb=short

      - name: Run tests (check mode)
        run: pytest tests/ --behaviorci -v --tb=short

      - name: Run tests (parallel execution)
        run: pytest tests/ -n 4 --behaviorci -v --tb=short

      - name: Type check
        run: mypy src/behaviorci/ --ignore-missing-imports --python-version ${{ matrix.python-version }}

      - name: Format check (black)
        run: black src/ tests/ --check

      - name: Import order check (isort)
        run: isort src/ tests/ --check-only --profile black

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
